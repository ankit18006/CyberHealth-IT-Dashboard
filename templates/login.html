{% extends "base.html" %}
{% block content %}

<div class="auth-box">
    <h2>Login</h2>
    <form method="POST">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button>Login</button>
    </form>
    <p>New User? <a href="/register">Register</a></p>
</div>

{% endblock %}
