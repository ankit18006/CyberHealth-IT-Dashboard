<!DOCTYPE html>
<html>
<head>
<title>CyberHealth IT Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Auto refresh 30 sec -->
<meta http-equiv="refresh" content="30">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="dark-mode">

<nav class="navbar navbar-dark bg-dark shadow-lg">
<div class="container-fluid">
<span class="navbar-brand fw-bold">🛡 CyberHealth Enterprise</span>

<div>
{% if session.get("role") == "admin" %}
<a href="/admin" class="btn btn-warning btn-sm me-2">Admin Panel</a>
{% endif %}

{% if session.get("user_id") %}
<a href="/logout" class="btn btn-danger btn-sm">Logout</a>
{% endif %}
</div>

</div>
</nav>

<div class="container mt-4">
{% block content %}{% endblock %}
</div>

</body>
</html>
